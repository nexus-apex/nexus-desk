{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Ticket | NexusDesk{% endblock %}
{% block page_title %}{% if editing %}Edit Ticket{% else %}New Ticket{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Subject</label>
        <input type="text" name="subject" value="{{ record.subject|default:'' }}">
      </div>
      <div class="form-group">
        <label>Requester Email</label>
        <input type="email" name="requester_email" value="{{ record.requester_email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select name="priority">
          <option value="low" {% if record.priority == 'low' %}selected{% endif %}>Low</option>
          <option value="medium" {% if record.priority == 'medium' %}selected{% endif %}>Medium</option>
          <option value="high" {% if record.priority == 'high' %}selected{% endif %}>High</option>
          <option value="critical" {% if record.priority == 'critical' %}selected{% endif %}>Critical</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="open" {% if record.status == 'open' %}selected{% endif %}>Open</option>
          <option value="in_progress" {% if record.status == 'in_progress' %}selected{% endif %}>In Progress</option>
          <option value="waiting" {% if record.status == 'waiting' %}selected{% endif %}>Waiting</option>
          <option value="resolved" {% if record.status == 'resolved' %}selected{% endif %}>Resolved</option>
          <option value="closed" {% if record.status == 'closed' %}selected{% endif %}>Closed</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ record.category|default:'' }}">
      </div>
      <div class="form-group">
        <label>Assigned To</label>
        <input type="text" name="assigned_to" value="{{ record.assigned_to|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Ticket</button>
      <a href="/tickets/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
