{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} KBArticle | NexusDesk{% endblock %}
{% block page_title %}{% if editing %}Edit KBArticle{% else %}New KBArticle{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ record.category|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea name="content">{{ record.content|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Views</label>
        <input type="number" name="views" value="{{ record.views|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Helpful Votes</label>
        <input type="number" name="helpful_votes" value="{{ record.helpful_votes|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="published" {% if record.status == 'published' %}selected{% endif %}>Published</option>
          <option value="archived" {% if record.status == 'archived' %}selected{% endif %}>Archived</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} KBArticle</button>
      <a href="/kbarticles/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
